name: RockyOS Cloud Build
on: [push] # The build starts whenever you change a file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev libgl1-mesa-dev libxml2-utils xsltproc unzip

      - name: Sync Minimal AOSP (Thin-Sync)
        run: |
          mkdir ~/rocky_build && cd ~/rocky_build
          repo init -u https://github.com/${{ github.repository }} -b main --depth=1
          repo sync -c -j$(nproc)

      - name: Build RockyOS System Image
        run: |
          source build/envsetup.sh
          lunch aosp_x86_64-eng
          m systemimage -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RockyOS-System-Image
          path: out/target/product/generic_x86_64/system.img
